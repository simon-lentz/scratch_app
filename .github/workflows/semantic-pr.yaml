name: semantic-pr

# Validate that the PR title follows Conventional Commits (feat:, fix:, …) so a
# squash-merge produces a machine-readable history. Advisory until added to the
# branch's required checks.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

# Least privilege: the check only reads the PR.
permissions:
  pull-requests: read

concurrency:
  group: semantic-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate-title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

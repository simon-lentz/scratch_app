name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: the gate only needs to read the repo.
permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter pub get
      - name: Format
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Test
        # Generates coverage/lcov.info for the coverage gate.
        run: flutter test --coverage
      - name: Coverage gate
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          # Exclude committed-but-generated drift code: it's only partially
          # exercised by focused DAO tests, so measuring it would sink coverage.
          exclude: "**/*.g.dart"
          min_coverage: 92
      - name: Build web
        run: flutter build web

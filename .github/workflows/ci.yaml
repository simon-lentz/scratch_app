name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: the gate only needs to read the repo.
permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc
          cache: true
      - run: flutter pub get
      - name: Verify committed generated code is current
        run: |
          dart run build_runner build
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is stale — run build_runner and commit the result."
            git status --porcelain
            exit 1
          fi
      - name: Format
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Test
        # Generates coverage/lcov.info for the coverage gate.
        run: flutter test --coverage
      - name: Coverage gate
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          # Exclude drift code that can't be meaningfully covered: the committed
          # *.g.dart, and the declarative table classes — drift generates a
          # $XTable that @override-shadows their column getters, so the getters
          # never run at runtime and always report 0%.
          exclude: "**/*.g.dart **/database/tables/checklists.dart **/database/tables/subtasks.dart **/database/tables/tasks.dart"
          min_coverage: 92
      - name: Build web
        run: flutter build web

  # Mobile is the target platform, so build the Android app too — the native
  # (sqlite3_flutter_libs) build path differs from web. iOS needs a macOS runner,
  # so it's deferred until iOS is a real release target. Keep this job out of the
  # required checks until its first run is green.
  build-android:
    name: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc
          cache: true
      - run: flutter pub get
      - name: Build Android (debug APK)
        run: flutter build apk --debug

# Static analysis configuration.
#
# Ruleset: very_good_analysis (strict) plus analyzer language-strictness flags.
# Findings surface in Dart-enabled IDEs and via `flutter analyze`.
# Suppress a rule locally with `// ignore: rule_name` or
# `// ignore_for_file: rule_name`.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  # Exclude generated files from analysis.
  exclude:
    - "**/*.g.dart"
    # drift's generated schema-migration fixtures (raw types from the generator).
    - "test/drift/**/generated/**"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
